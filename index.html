<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everest Academy School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        body {
            /* iOS Style Mesh Gradient Background */
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.6) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.6) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.6) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(139, 92, 246, 0.6) 0px, transparent 50%);
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Core Glassmorphism Class */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
        }

        /* Animated School Name */
        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        .school-name span {
            display: inline-block;
            animation: float 3s ease-in-out infinite alternate;
        }

        .everest { color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .academy { color: #e0f2fe; }
        .school { color: #bae6fd; }

        /* Slogan Animation */
        .slogan-text {
            background: linear-gradient(90deg, #ff8a00, #e52e71, #00f2fe, #ff8a00);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 4s linear infinite;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        @keyframes gradientFlow {
            to { background-position: 300% center; }
        }

        .photo-frame {
            position: relative;
            padding: 8px;
            border-radius: 28px;
        }

        .photo-frame img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
        }

        /* iOS tap effect */
        .btn-tap {
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .btn-tap:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body class="p-4 sm:p-6 flex flex-col items-center">

    <div class="w-full max-w-md">
        
        <div id="home-screen" class="space-y-6 py-4">
            
            <div class="text-center space-y-1">
                <h1 class="school-name text-4xl font-extrabold tracking-tight flex flex-col leading-none">
                    <span class="everest">EVEREST</span>
                    <span class="academy">ACADEMY</span>
                    <span class="school">SCHOOL</span>
                </h1>
                <p class="text-[10px] text-white/70 font-bold tracking-[0.25em] pt-2">
                    GODAWARI 02 ATTARIYA, KAILALI
                </p>
            </div>

            <div class="photo-frame glass">
                <img src="school.png" alt="Everest Academy" onerror="this.src='https://images.unsplash.com/photo-1546410531-bb4caa6b424d?auto=format&fit=crop&w=800&q=80'">
            </div>

            <div class="text-center px-2">
                <p class="slogan-text text-xl font-bold italic leading-tight">
                    "We believe in Modern way of Learning for Deep Knowledge"
                </p>
            </div>

            <div class="text-center pt-2">
                <h2 class="text-white font-black text-2xl tracking-tight drop-shadow-md">
                    Science Class 10
                </h2>
            </div>

            <div class="space-y-4 pt-2">
                
                <div class="pt-4">
                    <h3 class="text-sm font-semibold text-white/80 uppercase tracking-wider mb-3 px-1">Study Materials</h3>
                    <div class="grid gap-3">
                        <a href="1/1.1.html" class="glass p-4 flex items-center justify-between no-underline text-white btn-tap">
                            <span class="font-semibold text-md">1.1 Introduction</span>
                            <svg class="w-5 h-5 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </a>
                        <a href="1/1.2.html" class="glass p-4 flex items-center justify-between no-underline text-white btn-tap">
                            <span class="font-semibold text-md">1.2 Scientific learning steps</span>
                            <svg class="w-5 h-5 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </a>
                        <a href="1/1.3.html" class="glass p-4 flex items-center justify-between no-underline text-white btn-tap">
                            <span class="font-semibold text-md">1.3 Steam Engine</span>
                            <svg class="w-5 h-5 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </a>
                        <a href="1/1.4.html" class="glass p-4 flex items-center justify-between no-underline text-white btn-tap">
                            <span class="font-semibold text-md">1.4 Activity I</span>
                            <svg class="w-5 h-5 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </a>
                        <a href="1/1.5.html" class="glass p-4 flex items-center justify-between no-underline text-white btn-tap">
                            <span class="font-semibold text-md">1.5 Activity Ii</span>
                            <svg class="w-5 h-5 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </a>
                    </div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
