<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Civil Notes Loksewa Prep - Daily Mock Tests</title>
    <style>
        :root {
            --background-color: #e6eef5;
            --text-main: #2d3748;
            --text-muted: #718096;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        body { 
            background-color: var(--background-color); 
            color: var(--text-main); 
            line-height: 1.6; 
            padding-bottom: 60px; 
            overflow-x: hidden;
        }

        /* --- Claymorphism Header --- */
        header {
            background: #ffffff;
            color: var(--text-main);
            padding: 40px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            /* Clay shadow effect */
            box-shadow: 
                15px 15px 30px rgba(163, 177, 198, 0.5), 
                -15px -15px 30px rgba(255, 255, 255, 0.9),
                inset 4px 4px 10px rgba(255, 255, 255, 0.5),
                inset -4px -4px 10px rgba(0, 0, 0, 0.05);
            margin-bottom: 40px;
        }

        header h1 { 
            font-size: 2.8rem; 
            font-weight: 800;
            margin-bottom: 10px; 
            background: linear-gradient(135deg, #ff7eb3, #ff758c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px; 
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        /* --- Claymorphism Animated Cards --- */
        .quiz-card {
            text-decoration: none;
            color: var(--text-main);
            border-radius: 35px;
            padding: 25px 20px;
            display: flex;
            align-items: center;
            position: relative;
            transition: all 0.4s ease;
            /* Base clay shadows (will overlay with colors below) */
            box-shadow: 
                10px 10px 20px rgba(163, 177, 198, 0.4), 
                -10px -10px 20px rgba(255, 255, 255, 0.8),
                inset 6px 6px 15px rgba(255, 255, 255, 0.6),
                inset -6px -6px 15px rgba(0, 0, 0, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        /* Colorful Alternating Clay Backgrounds */
        .quiz-card:nth-child(5n+1) { background-color: #ffc9de; } /* Pink */
        .quiz-card:nth-child(5n+2) { background-color: #c9e4ff; } /* Blue */
        .quiz-card:nth-child(5n+3) { background-color: #d1ffc9; } /* Green */
        .quiz-card:nth-child(5n+4) { background-color: #fff4c9; } /* Yellow */
        .quiz-card:nth-child(5n+5) { background-color: #e5c9ff; } /* Purple */

        /* Staggered animation delays for a dynamic feel */
        .quiz-card:nth-child(2n) { animation-delay: 1s; }
        .quiz-card:nth-child(3n) { animation-delay: 2s; }
        .quiz-card:nth-child(4n) { animation-delay: 0.5s; }

        .quiz-card:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 
                15px 15px 30px rgba(163, 177, 198, 0.6), 
                -15px -15px 30px rgba(255, 255, 255, 1),
                inset 8px 8px 20px rgba(255, 255, 255, 0.8),
                inset -8px -8px 20px rgba(0, 0, 0, 0.15);
        }

        .quiz-icon {
            background: rgba(255, 255, 255, 0.7);
            color: #2d3748;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 800;
            margin-right: 18px;
            flex-shrink: 0;
            box-shadow: inset 3px 3px 6px rgba(255,255,255,0.9), inset -3px -3px 6px rgba(0,0,0,0.1);
        }

        .quiz-title { 
            font-size: 1.2rem; 
            font-weight: 700; 
            line-height: 1.3;
        }

        /* Floating Keyframes */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        #status-message { 
            text-align: center; 
            padding: 40px; 
            font-size: 1.3rem; 
            font-weight: bold;
            color: var(--text-muted); 
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Civil Notes Loksewa Hub</h1>
        <p>Daily Mock Tests & Preparations</p>
    </header>

    <div class="container">
        <div id="status-message">Loading Daily Tests...</div>
        <div id="quiz-container" class="grid-container hidden"></div>
    </div>

    <script>
        const GITHUB_OWNER = 'antinogutress-maker'; 
        const GITHUB_REPO = 'SMARTMOCK';        
        const FOLDER_PATH = 'tests'; 
        
        const container = document.getElementById('quiz-container');
        const statusMessage = document.getElementById('status-message');

        // Function to beautify the file name for display
        function formatTitle(filename) {
            let name = filename.replace('.html', '');
            name = name.replace(/[-_]/g, ' '); 
            return name.replace(/\b\w/g, char => char.toUpperCase()); 
        }

        async function fetchQuizzes() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FOLDER_PATH}`);
                
                if (!response.ok) throw new Error('Failed to fetch tests from GitHub.');

                const files = await response.json();
                let fetchedFiles = files.filter(file => file.name.endsWith('.html'));

                // --- STRICT NUMBERING DESCENDING SORT LOGIC ---
                // Extracts the number right before ".html" and sorts descending
                fetchedFiles.sort((a, b) => {
                    // Match the last digits before .html (e.g., "Test 12.html" extracts "12")
                    const matchA = a.name.match(/(\d+)\.html$/);
                    const matchB = b.name.match(/(\d+)\.html$/);
                    
                    const numA = matchA ? parseInt(matchA[1], 10) : 0;
                    const numB = matchB ? parseInt(matchB[1], 10) : 0;

                    // If numbers are different, sort by highest number first
                    if (numB !== numA) {
                        return numB - numA;
                    }
                    
                    // Fallback to alphabetical if there are no numbers
                    return b.name.localeCompare(a.name);
                });

                if (fetchedFiles.length === 0) {
                    statusMessage.innerText = "No mock tests available yet.";
                    statusMessage.style.animation = "none";
                    return;
                }

                statusMessage.classList.add('hidden');
                container.classList.remove('hidden');
                
                renderQuizzes(fetchedFiles);

            } catch (error) {
                statusMessage.innerText = `Error: ${error.message}`;
                statusMessage.style.color = '#ef4444'; 
                statusMessage.style.animation = "none";
            }
        }

        // --- RENDER LOGIC ---
        function renderQuizzes(quizArray) {
            container.innerHTML = ''; 

            quizArray.forEach((file, index) => {
                const formattedName = formatTitle(file.name);
                const card = document.createElement('a');
                
                card.className = 'quiz-card';
                card.href = `${FOLDER_PATH}/${file.name}`; 

                card.innerHTML = `
                    <div class="quiz-icon">${index + 1}</div>
                    <div class="quiz-title">${formattedName}</div>
                `;

                container.appendChild(card);
            });
        }

        // Initialize fetch
        fetchQuizzes();
    </script>
</body>
</html>
